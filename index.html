<!DOCTYPE html>

<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Rehab Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1:#0d1117;--bg2:#161b22;--bg3:#1c2128;
  --accent:#38bd94;--accent2:#2dd4a0;--accent-glow:rgba(56,189,148,0.3);
  --text1:#e6edf3;--text2:#c9d1d9;--text3:#8b949e;--text4:#484f58;
  --card:rgba(255,255,255,0.025);--card-border:rgba(255,255,255,0.05);
  --danger:#ff6b6b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
::-webkit-scrollbar{display:none}
html,body{overscroll-behavior:none}
body{min-height:100vh;min-height:100dvh;background:linear-gradient(165deg,var(--bg1) 0%,var(--bg2) 40%,#1a1f2b 100%);font-family:'DM Sans',sans-serif;color:var(--text1);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.ambient{position:fixed;top:-120px;right:-120px;width:400px;height:400px;background:radial-gradient(circle,rgba(56,189,148,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.header{padding:28px 20px 0;position:relative;z-index:1}
.header-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2.5px;color:var(--accent)}
.header-title{margin-top:4px;font-size:28px;font-weight:700;font-family:'Playfair Display',serif;background:linear-gradient(135deg,var(--text1) 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tabs{display:flex;gap:4px;padding:18px 20px 0;position:relative;z-index:1}
.tab{flex:1;padding:10px 0;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;background:rgba(255,255,255,0.03);color:var(--text3);transition:all 0.2s}
.tab.active{background:rgba(56,189,148,0.12);color:var(--accent)}
.day-pills{display:flex;gap:6px;padding:16px 20px 0;overflow-x:auto;position:relative;z-index:1;scrollbar-width:none}
.day-pill{padding:8px 12px;border-radius:20px;position:relative;border:1.5px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:var(--text4);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.2s}
.day-pill.has-ex{color:var(--text2)}.day-pill.active{border-color:var(--accent);background:linear-gradient(135deg,rgba(56,189,148,0.15),rgba(56,189,148,0.05));color:var(--accent);font-weight:600}
.day-pill .dot{position:absolute;top:-4px;right:-4px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2);display:none}.day-pill.done .dot{display:block}
.progress-wrap{padding:16px 20px 0;position:relative;z-index:1}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:12px;color:var(--text3);font-weight:500}
.progress-count{font-size:12px;font-weight:600;color:var(--text1)}.progress-count.complete{color:var(--accent)}
.progress-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
.progress-fill.glow{box-shadow:0 0 12px var(--accent-glow)}.progress-fill.alldone{background:linear-gradient(90deg,var(--accent),#6ee7b7)}
.cards{padding:16px 20px;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:16px;display:flex;align-items:flex-start;gap:14px;animation:fadeSlideIn 0.35s ease both}
.card.checked{background:linear-gradient(135deg,rgba(56,189,148,0.1),rgba(56,189,148,0.03));border-color:rgba(56,189,148,0.25)}
.checkbox{width:28px;height:28px;border-radius:9px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;margin-top:1px;transition:all 0.25s;font-size:14px;color:#fff}
.card.checked .checkbox{border:none;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.card-name{font-size:15px;font-weight:600;transition:all 0.25s}
.card.checked .card-name{color:var(--accent);text-decoration:line-through;opacity:0.7}
.tag{font-size:12px;color:var(--text3);background:rgba(255,255,255,0.04);padding:2px 8px;border-radius:6px;display:inline-block;margin-right:6px;margin-top:6px}
.tag.time{color:var(--accent);background:rgba(56,189,148,0.08)}
.card-note{margin-top:6px;font-size:12px;color:#6e7681;font-style:italic}
.instance-badge{font-size:10px;font-weight:700;color:var(--accent);background:rgba(56,189,148,0.1);padding:2px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px;margin-left:8px}
.comment-area{margin-top:10px;width:100%;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text2);font-size:13px;font-family:inherit;resize:none;outline:none;min-height:36px;transition:border-color 0.2s}
.comment-area:focus{border-color:var(--accent)}.comment-area::placeholder{color:var(--text4)}
.empty{text-align:center;padding:48px 20px;color:var(--text4)}
.empty-icon{font-size:40px;margin-bottom:12px}.empty-title{font-size:15px;font-weight:600;color:var(--text3)}.empty-sub{font-size:13px;margin-top:4px}
.celebration{text-align:center;padding:12px 20px 0;animation:fadeSlideIn 0.5s ease;display:none}.celebration.show{display:block}
.celebration-inner{background:linear-gradient(135deg,rgba(56,189,148,0.12),rgba(56,189,148,0.04));border:1px solid rgba(56,189,148,0.2);border-radius:16px;padding:20px}
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;box-shadow:0 4px 20px rgba(56,189,148,0.35);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--bg1);font-weight:300;z-index:50}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease}
.modal-overlay.open{display:flex}
.modal{background:var(--bg3);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px 20px 32px;animation:slideUp 0.3s ease}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;font-family:'Playfair Display',serif}
.form-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:var(--text1);font-size:15px;font-family:inherit;outline:none;margin-bottom:14px}
.form-input:focus{border-color:var(--accent)}
.form-row{display:flex;gap:10px}.form-row>div{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{padding:6px 12px;border-radius:16px;border:1.5px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.2s}
.chip.active{border-color:var(--accent);background:rgba(56,189,148,0.12);color:var(--accent);font-weight:600}
.btn-save{width:100%;padding:14px 0;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;margin-top:6px;transition:all 0.2s;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg1)}
.btn-save.disabled{background:rgba(255,255,255,0.06);color:var(--text4);cursor:default}
.btn-delete{width:100%;padding:12px 0;border-radius:12px;background:rgba(255,70,70,0.08);border:1px solid rgba(255,70,70,0.15);cursor:pointer;color:var(--danger);font-size:14px;font-weight:600;font-family:inherit;margin-top:10px}
.week-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 20px 0;position:relative;z-index:1}
.week-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px 14px;color:var(--text3);font-size:18px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.week-btn:disabled{opacity:0.3;cursor:default}
.week-label{font-size:14px;font-weight:600;color:var(--text2);min-width:160px;text-align:center}
.week-label .sub{font-size:11px;color:var(--text4);font-weight:500;display:block;margin-top:2px}
.history-day{margin-bottom:16px}
.history-day-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.history-day-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px}
.history-ex{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:12px;margin-bottom:6px;font-size:13px}
.history-ex.was-done{border-color:rgba(56,189,148,0.15);background:rgba(56,189,148,0.04)}
.history-ex-name{font-weight:600;display:flex;align-items:center;gap:6px}
.history-ex-comment{margin-top:6px;font-size:12px;color:var(--text3);font-style:italic;border-left:2px solid rgba(56,189,148,0.3);padding-left:8px}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="header">
  <p class="header-label">Rehab Tracker</p>
  <h1 class="header-title" id="pageTitle">Dagens pass</h1>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('tracker')" id="tabTracker">📋 Schema</button>
  <button class="tab" onclick="switchTab('library')" id="tabLibrary">📚 Övningar</button>
  <button class="tab" onclick="switchTab('history')" id="tabHistory">📅 Historik</button>
</div>
<div id="content" style="padding-bottom:90px"></div>
<button class="fab" onclick="openAdd()" id="fabBtn">+</button>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h2 class="modal-title" id="modalTitle">Ny övning</h2>
    <div id="modalBody"></div>
  </div>
</div>
<script>
const DAYS=["Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag","Söndag"];
const SHORT=["Mån","Tis","Ons","Tor","Fre","Lör","Sön"];
const CI={"Ben":"🦵","Höft":"🍑","Core":"💪","Rygg":"🔙","Axlar":"🤸","Balans":"⚖️","Stretch":"🧘","Cardio":"❤️‍🔥","Vila":"🌿","Övrigt":"🔄"};
const CATS=Object.keys(CI);
let S={exercises:[],log:{}};
let tab="tracker",aDay,editId=null,weekOff=0;

// — Week key: always Monday’s date as YYYY-MM-DD —
function getMonday(date){
const d=new Date(date);d.setHours(0,0,0,0);
const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
d.setDate(diff);return d.toISOString().slice(0,10);
}
function thisWeekKey(){return getMonday(new Date())}
function viewedWeekKey(){const d=new Date();d.setDate(d.getDate()+weekOff*7);return getMonday(d)}

// Today’s day index (0=Mon … 6=Sun)
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1}
aDay=todayIdx();

// Log keys are scoped per week: “YYYY-MM-DD_dayIdx_exId_instance”
function lk(eid,di,inst,wk){return wk+”*”+di+”*”+eid+”_”+inst}

// — Persistence —
function load(){try{const s=localStorage.getItem(“rehab-v3”);if(s)S=JSON.parse(s)}catch(e){}}
function save(){try{localStorage.setItem(“rehab-v3”,JSON.stringify(S))}catch(e){}}
load();

// — Exercises for a given day —
function exsForDay(di){
const dn=DAYS[di],r=[];
S.exercises.forEach(ex=>{
if(ex.days&&ex.days.includes(dn)){
const t=ex.timesPerDay||1;
for(let i=0;i<t;i++) r.push({…ex,inst:i,iLabel:t>1?“Pass “+(i+1):null});
}
});return r;
}

// — Toggle / comment (always uses current week for tracker) —
function togDone(eid,di,inst){
const wk=thisWeekKey(),k=lk(eid,di,inst,wk);
if(!S.log[k])S.log[k]={done:false,comment:””,ts:null};
S.log[k].done=!S.log[k].done;
S.log[k].ts=S.log[k].done?new Date().toISOString():null;
save();render();
}
function updComment(eid,di,inst,txt){
const wk=thisWeekKey(),k=lk(eid,di,inst,wk);
if(!S.log[k])S.log[k]={done:false,comment:””,ts:null};
S.log[k].comment=txt;save();
}

function switchTab(t){tab=t;weekOff=0;render()}
function esc(s){return String(s).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’).replace(/’/g,’'’)}

// — Render —
function render(){
document.getElementById(“tabTracker”).className=“tab”+(tab===“tracker”?” active”:””);
document.getElementById(“tabLibrary”).className=“tab”+(tab===“library”?” active”:””);
document.getElementById(“tabHistory”).className=“tab”+(tab===“history”?” active”:””);
document.getElementById(“fabBtn”).style.display=tab===“history”?“none”:“flex”;
const titles={tracker:“Dagens pass”,library:“Övningsbibliotek”,history:“Historik”};
document.getElementById(“pageTitle”).textContent=titles[tab];
if(tab===“tracker”)rTracker();else if(tab===“library”)rLibrary();else rHistory();
}

function rTracker(){
const wk=thisWeekKey(),exs=exsForDay(aDay);
const dc=exs.filter(e=>S.log[lk(e.id,aDay,e.inst,wk)]?.done).length,tot=exs.length;
const pct=tot>0?(dc/tot)*100:0,allD=dc===tot&&tot>0;
let h=’<div class="day-pills">’;
DAYS.forEach((d,i)=>{
const de=exsForDay(i),dd=de.length>0&&de.every(e=>S.log[lk(e.id,i,e.inst,wk)]?.done),he=de.length>0;
let c=“day-pill”;if(i===aDay)c+=” active”;if(he)c+=” has-ex”;if(dd)c+=” done”;
const isToday=i===todayIdx();
h+=`<button class="${c}" onclick="aDay=${i};render()">${SHORT[i]}${isToday?' •':''}<span class="dot"></span></button>`;
});
h+=’</div>’;
if(tot>0){h+=`<div class="progress-wrap"><div class="progress-header"><span class="progress-label">Framsteg</span><span class="progress-count${allD?' complete':''}">${dc}/${tot}${allD?' ✓ Klart!':''}</span></div><div class="progress-bar"><div class="progress-fill${pct>0?' glow':''}${allD?' alldone':''}" style="width:${pct}%"></div></div></div>`}
h+=’<div class="cards">’;
if(exs.length===0){h+=`<div class="empty"><div class="empty-icon">📭</div><p class="empty-title">Inga övningar för ${DAYS[aDay].toLowerCase()}</p><p class="empty-sub">Tryck på + för att lägga till</p></div>`}
else exs.forEach((ex,idx)=>{
const k=lk(ex.id,aDay,ex.inst,wk),en=S.log[k]||{done:false,comment:””},dn=en.done,ic=CI[ex.category]||“🔄”;
h+=`<div class="card${dn?' checked':''}" style="animation-delay:${idx*0.05}s"> <div class="checkbox" onclick="togDone('${ex.id}',${aDay},${ex.inst})">${dn?'✓':''}</div> <div style="flex:1;min-width:0"> <div style="display:flex;align-items:center;cursor:pointer" onclick="togDone('${ex.id}',${aDay},${ex.inst})"> <span style="font-size:18px;margin-right:8px">${ic}</span> <span class="card-name">${esc(ex.name)}</span> ${ex.iLabel?`<span class="instance-badge">${ex.iLabel}</span>`:''} </div> <div>${ex.sets?`<span class="tag">${ex.sets} sets</span>`:''}${ex.reps?`<span class="tag">${ex.reps} reps</span>`:''}${ex.time?`<span class="tag time">⏱ ${esc(ex.time)}</span>`:''}</div> ${ex.note?`<p class="card-note">${esc(ex.note)}</p>`:''} ${dn?`<textarea class="comment-area" placeholder="Kommentar… (smärta, känsla, variation)" oninput="updComment('${ex.id}',${aDay},${ex.inst},this.value)">${esc(en.comment||’’)}</textarea>`:''} </div> <button onclick="openEdit('${ex.id}')" style="background:none;border:none;cursor:pointer;color:var(--text4);font-size:16px;padding:4px;flex-shrink:0">✏️</button> </div>`;});
h+=’</div>’;
h+=`<div class="celebration${allD?' show':''}"><div class="celebration-inner">
<div style="font-size:32px;margin-bottom:8px">🎉</div>
<p style="font-weight:700;font-size:16px;font-family:'Playfair Display',serif;color:var(--accent)">Bra jobbat!</p>
<p style="margin-top:4px;font-size:13px;color:var(--text3)">Alla övningar avklarade för ${DAYS[aDay].toLowerCase()}.</p>

  </div></div>`;
  document.getElementById("content").innerHTML=h;
}

function rLibrary(){
let h=’<div style="padding:16px 20px">’;
if(S.exercises.length===0){h+=`<div class="empty"><div class="empty-icon">🏋️</div><p class="empty-title">Inga övningar ännu</p><p class="empty-sub">Tryck på + för att lägga till</p></div>`}
else S.exercises.forEach((ex,idx)=>{
const ic=CI[ex.category]||“🔄”,ds=ex.days&&ex.days.length>0?ex.days.map(d=>d.slice(0,3)).join(”, “):’<span style="color:var(--text4)">Inga dagar</span>’,ts=ex.timesPerDay>1?` <span style="color:var(--accent)">× ${ex.timesPerDay}/dag</span>`:’’;
h+=`<div class="card" style="cursor:pointer;animation-delay:${idx*0.04}s;margin-bottom:10px" onclick="openEdit('${ex.id}')"> <span style="font-size:22px">${ic}</span> <div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:600">${esc(ex.name)}</div><div style="font-size:12px;color:var(--text3);margin-top:4px">${ds}${ts}</div></div> <span style="color:var(--text4);font-size:14px">›</span></div>`;});
h+=’</div>’;
document.getElementById(“content”).innerHTML=h;
}

function isoWeek(d){const dt=new Date(d.getTime());dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);const w1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt.getTime()-w1.getTime())/864e5-3+(w1.getDay()+6)%7)/7)}

function rHistory(){
const wk=viewedWeekKey(),ws=new Date(wk+“T00:00:00”),we=new Date(ws);we.setDate(we.getDate()+6);
const isCur=weekOff===0,fmt=d=>`${d.getDate()}/${d.getMonth()+1}`;

// Check if any data exists for weeks ahead
let h=`<div class="week-nav"> <button class="week-btn" onclick="weekOff--;render()">‹</button> <div class="week-label">${isCur?'Denna vecka':'Vecka '+isoWeek(ws)}<span class="sub">${fmt(ws)} – ${fmt(we)}</span></div> <button class="week-btn" onclick="weekOff++;render()"${isCur?' disabled':''}>›</button></div>`;

h+=’<div style="padding:16px 20px">’;

// Week summary
let totalDone=0,totalAll=0;
DAYS.forEach((dn,di)=>{
const exs=exsForDay(di);
exs.forEach(ex=>{totalAll++;if(S.log[lk(ex.id,di,ex.inst,wk)]?.done)totalDone++});
});
if(totalAll>0){
const wpct=Math.round((totalDone/totalAll)*100);
const wColor=wpct===100?‘var(–accent)’:wpct>=50?’#e8a735’:‘var(–text4)’;
h+=`<div style="background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:16px;margin-bottom:16px;text-align:center"> <div style="font-size:32px;font-weight:700;color:${wColor};font-family:'Playfair Display',serif">${wpct}%</div> <div style="font-size:12px;color:var(--text3);margin-top:4px">${totalDone} av ${totalAll} övningar genomförda</div> </div>`;
}

let any=false;
DAYS.forEach((dn,di)=>{
const exs=exsForDay(di);if(!exs.length)return;any=true;
const entries=exs.map(ex=>{const k=lk(ex.id,di,ex.inst,wk);return{ex,en:S.log[k]||{done:false,comment:””}}}),
dc=entries.filter(e=>e.en.done).length,tot=entries.length,allD=dc===tot,none=dc===0;
const bc=allD?‘var(–accent)’:none?‘var(–text4)’:’#e8a735’,bb=allD?‘rgba(56,189,148,0.12)’:none?‘rgba(255,255,255,0.04)’:‘rgba(232,167,53,0.12)’;
h+=`<div class="history-day"><div class="history-day-title">${dn}<span class="history-day-badge" style="color:${bc};background:${bb}">${dc}/${tot}</span></div>`;
entries.forEach(({ex,en})=>{const ic=CI[ex.category]||“🔄”;
h+=`<div class="history-ex${en.done?' was-done':''}"> <div class="history-ex-name">${en.done?'✅':'⬜'} ${ic} ${esc(ex.name)}${ex.iLabel?` <span class="instance-badge">${ex.iLabel}</span>`:''}</div> <div>${ex.sets?`<span class="tag">${ex.sets}s</span>`:''}${ex.reps?`<span class="tag">${ex.reps}r</span>`:''}${ex.time?`<span class="tag time">⏱${esc(ex.time)}</span>`:''}</div> ${en.comment?`<div class="history-ex-comment">${esc(en.comment)}</div>`:''}</div>`;});
h+=’</div>’;});
if(!any)h+=`<div class="empty"><div class="empty-icon">📅</div><p class="empty-title">Inga övningar inlagda</p><p class="empty-sub">Lägg till övningar och välj dagar</p></div>`;
h+=’</div>’;
document.getElementById(“content”).innerHTML=h;
}

// — Modal —
function openModal(){document.getElementById(“modalOverlay”).classList.add(“open”)}
function closeModal(){document.getElementById(“modalOverlay”).classList.remove(“open”);editId=null}
function openAdd(){editId=null;document.getElementById(“modalTitle”).textContent=“Ny övning”;rForm({});openModal()}
function openEdit(id){const ex=S.exercises.find(e=>e.id===id);if(!ex)return;editId=id;document.getElementById(“modalTitle”).textContent=“Redigera övning”;rForm(ex);openModal()}

function rForm(ex){
const nm=ex.name||’’,cat=ex.category||‘Övrigt’,sets=ex.sets||’’,reps=ex.reps||’’,time=ex.time||’’,note=ex.note||’’,days=ex.days||[],tpd=ex.timesPerDay||1;
let h=`<label class="form-label">Namn</label><input class="form-input" id="fN" value="${esc(nm)}" placeholder="T.ex. Knäböj">`;
h+=`<label class="form-label">Kategori</label><div class="chips" id="cC">`;
CATS.forEach(c=>{h+=`<button class="chip${c===cat?' active':''}" onclick="selCat(this,'${c}')">${CI[c]} ${c}</button>`});
h+=’</div>’;
h+=`<div class="form-row"><div><label class="form-label">Sets</label><input class="form-input" id="fS" type="number" value="${sets}" placeholder="3"></div><div><label class="form-label">Reps</label><input class="form-input" id="fR" type="number" value="${reps}" placeholder="12"></div></div>`;
h+=`<label class="form-label">Tid (valfritt)</label><input class="form-input" id="fT" value="${esc(time)}" placeholder="T.ex. 30s, 2 min">`;
h+=`<label class="form-label">Anteckning (valfritt)</label><input class="form-input" id="fNo" value="${esc(note)}" placeholder="T.ex. Per sida">`;
h+=`<label class="form-label">Dagar</label><div class="chips" id="dC">`;
DAYS.forEach((d,i)=>{h+=`<button class="chip${days.includes(d)?' active':''}" onclick="togDC(this)">${SHORT[i]}</button>`});
h+=’</div>’;
h+=`<label class="form-label">Gånger per dag</label><input class="form-input" id="fTPD" type="number" value="${tpd}" placeholder="1">`;
h+=`<button class="btn-save" onclick="saveEx()">${editId?'Spara ändringar':'Lägg till övning'}</button>`;
if(editId)h+=`<button class="btn-delete" onclick="delEx('${editId}')">Ta bort övning</button>`;
document.getElementById(“modalBody”).innerHTML=h;
}
function selCat(el){el.parentElement.querySelectorAll(’.chip’).forEach(x=>x.classList.remove(‘active’));el.classList.add(‘active’)}
function togDC(el){el.classList.toggle(‘active’)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function saveEx(){
const nm=document.getElementById(“fN”).value.trim();if(!nm)return;
const catEl=document.querySelector(”#cC .chip.active”),cat=catEl?catEl.textContent.trim().split(’ ‘).pop():“Övrigt”;
const sets=parseInt(document.getElementById(“fS”).value)||null,reps=parseInt(document.getElementById(“fR”).value)||null;
const time=document.getElementById(“fT”).value.trim()||null,note=document.getElementById(“fNo”).value.trim()||null;
const days=[];document.querySelectorAll(”#dC .chip.active”).forEach(el=>{const idx=SHORT.indexOf(el.textContent.trim());if(idx>=0)days.push(DAYS[idx])});
const tpd=parseInt(document.getElementById(“fTPD”).value)||1;
const ex={id:editId||uid(),name:nm,category:cat,sets,reps,time,note,days,timesPerDay:tpd};
if(editId)S.exercises=S.exercises.map(e=>e.id===editId?{…e,…ex}:e);
else S.exercises.push(ex);
save();closeModal();render();
}
function delEx(id){S.exercises=S.exercises.filter(e=>e.id!==id);Object.keys(S.log).forEach(k=>{if(k.includes(’*’+id+’*’))delete S.log[k]});save();closeModal();render()}
render();
</script>
